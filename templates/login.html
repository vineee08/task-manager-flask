{% extends "base.html" %}

{% block title %}Login - Task Manager{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 40px auto;">
    <div class="card">
        <h2 style="text-align: center; margin-bottom: 30px;">
            <i class="fas fa-sign-in-alt"></i> Login
        </h2>
        <form method="POST">
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 500;">Username</label>
                <input type="text" name="username" required 
                       style="width: 100%; padding: 12px; border-radius: 10px; border: 2px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: white; font-size: 1rem;">
            </div>
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 500;">Password</label>
                <input type="password" name="password" required 
                       style="width: 100%; padding: 12px; border-radius: 10px; border: 2px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: white; font-size: 1rem;">
            </div>
            <div style="margin-bottom: 20px;">
                <label style="display: flex; align-items: center; gap: 8px;">
                    <input type="checkbox" name="remember"> Remember me
                </label>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 14px;">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </form>
        <p style="text-align: center; margin-top: 20px; opacity: 0.8;">
            Don't have an account? <a href="{{ url_for('register') }}" style="color: #feca57;">Register</a>
        </p>
    </div>
</div>
{% endblock %}
