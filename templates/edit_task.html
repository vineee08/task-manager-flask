{% extends "base.html" %}

{% block title %}Edit Task{% endblock %}

{% block content %}
<div style="max-width: 600px; margin: 0 auto;">
    <div class="card">
        <h2 class="card-title"><i class="fas fa-edit"></i> Edit Task</h2>
        
        <form method="POST">
            <div style="margin-bottom: 15px;">
                <label>Title *</label>
                <input type="text" name="title" value="{{ task.title }}" required>
            </div>
            
            <div style="margin-bottom: 15px;">
                <label>Description</label>
                <textarea name="description" rows="4">{{ task.description or '' }}</textarea>
            </div>
            
            <div style="margin-bottom: 15px;">
                <label>Priority</label>
                <select name="priority">
                    <option value="High" {% if task.priority == 'High' %}selected{% endif %}>High</option>
                    <option value="Medium" {% if task.priority == 'Medium' %}selected{% endif %}>Medium</option>
                    <option value="Low" {% if task.priority == 'Low' %}selected{% endif %}>Low</option>
                </select>
            </div>
            
            <div style="margin-bottom: 15px;">
                <label>Status</label>
                <select name="status">
                    <option value="Pending" {% if task.status == 'Pending' %}selected{% endif %}>Pending</option>
                    <option value="Completed" {% if task.status == 'Completed' %}selected{% endif %}>Completed</option>
                </select>
            </div>
            
            <div style="margin-bottom: 20px;">
                <label>Due Date</label>
                <input type="date" name="due_date" value="{{ task.due_date.strftime('%Y-%m-%d') if task.due_date else '' }}">
            </div>
            
            <div style="display: flex; gap: 10px;">
                <button type="submit" class="btn btn-primary" style="flex:1;">
                    <i class="fas fa-save"></i> Update
                </button>
                <a href="{{ url_for('tasks') }}" class="btn btn-outline" style="flex:1; text-align:center;">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
